services:
  - type: web
    name: energy-transition-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --timeout 120 --workers 1 --threads 2 --preload
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
